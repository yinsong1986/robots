site_name: Strands Robots
site_url: https://strands-labs.github.io/robots
site_description: "Robot control, simulation, and training for Strands Agents"
repo_url: https://github.com/strands-labs/robots
repo_name: strands-labs/robots
extra_css:
- stylesheets/extra.css?v=2
extra_javascript:
- https://unpkg.com/mermaid@10/dist/mermaid.min.js
- assets/mermaid-init.js
nav:
- Home: index.md
- AI Agents: agents.md
- Getting Started:
  - Quickstart: getting-started/quickstart.md
  - Installation: getting-started/installation.md
  - Robot Factory: getting-started/robot-factory.md
- Robots:
  - Catalog: robots/index.md
  - Arms: robots/arms.md
  - Bimanual: robots/bimanual.md
  - Hands: robots/hands.md
  - Humanoids: robots/humanoids.md
  - Mobile: robots/mobile.md
- Simulation:
  - Overview: simulation/overview.md
  - World Building: simulation/world-building.md
  - Domain Randomization: simulation/domain-randomization.md
- Device Connect: device-connect.md
- Multi-robot Mesh: mesh.md
- Policy Providers:
  - Overview: policies/overview.md
  - GR00T: policies/groot.md
  - Cosmos 3: policies/cosmos3.md
  - cuRobo: policies/curobo.md
  - MoveIt2: policies/moveit2.md
  - LeRobot Local: policies/lerobot-local.md
  - Custom Policies: policies/custom-policies.md
- Real Hardware:
  - Robot Control: hardware/robot-control.md
  - Tools: hardware/tools.md
- Training:
  - Overview: training/overview.md
- Recording & Datasets: recording.md
- Examples:
  - Overview: examples/overview.md
- Architecture: architecture.md
- API Reference: api-reference.md
- Security: security.md
- Contributing: contributing.md
- Troubleshooting: troubleshooting.md
theme:
  name: material
  logo: assets/strands-logo.svg
  favicon: assets/strands-logo.svg
  palette:
    - scheme: default
      primary: white
      accent: green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
  - navigation.sections
  - navigation.expand
  - navigation.indexes
  - toc.follow
  - content.code.copy
  - content.tabs.link
  - navigation.top
  - navigation.tracking
markdown_extensions:
- pymdownx.highlight:
    anchor_linenums: true
- pymdownx.inlinehilite
- pymdownx.superfences:
    custom_fences:
    - name: mermaid
      class: mermaid
      format: !!python/name:pymdownx.superfences.fence_code_format ''
- pymdownx.tabbed:
    alternate_style: true
- admonition
- pymdownx.details
- pymdownx.betterem
- pymdownx.mark
- pymdownx.caret
- pymdownx.tilde
- pymdownx.keys
- pymdownx.tasklist:
    custom_checkbox: true
- pymdownx.emoji:
    emoji_index: !!python/name:material.extensions.emoji.twemoji ''
    emoji_generator: !!python/name:material.extensions.emoji.to_svg ''
- attr_list
- md_in_html
- tables
- toc:
    permalink: true